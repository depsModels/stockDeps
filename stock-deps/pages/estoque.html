<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/styleSass.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
</head>

<body>

    <!--TOPO DA PÁGINA-->
    <nav class="navbar">
        <p class="deps">Stock deps</p>
        <!--BARRA DE PESQUISA-->
        <div class="inputPesquisa">
            <form class="d-flex" role="search">
                <input class="form-control form-control-lg me-2" type="search" placeholder="Procurar cliente"
                    aria-label="Search">
                <button class="btn btn-outline-dark" type="submit">Procurar</button>
            </form>
        </div>
        <hr>
    </nav>


    <div id="container">

        <!--Container da Barra Lateral-->
        <div class="containerBarraLateral">
            <!--Barra Lateral cadastro de produtos-->
            <div class="barraLateralCadastro">
                <!--Título barra lateral CADASTRO-->
                <p class="titulosBarraLateral">CADASTRO</p>

                <input type="radio" name="checks" id="checkProduto">
                <label for="checkProduto">
                    <p class="botao-produtos">
                        PRODUTOS
                    </p>
                </label>
            </div>
            <!--Barra Lateral estoque, entrada e saída-->
            <div class="barraLateralCadastro">

                <!--Título barra lateral ESTOQUE-->
                <p class="titulosBarraLateral">ESTOQUE</p>

                <input type="radio" name="checks" id="checkSaldo">
                <label for="checkSaldo">
                    <p class="botao-produtos">
                        SALDO
                    </p>
                </label>

                <input type="radio" name="checks" id="checkEntradas">
                <label for="checkEntradas">
                    <p class="botao-produtos">
                        ENTRADAS
                    </p>
                </label>

                <input type="radio" name="checks" id="checkSaidas">
                <label for="checkSaidas">
                    <p class="botao-produtos">
                        SAÍDAS
                    </p>
                </label>
            </div>
        </div>

        <!--Telas com as funções do estoque-->
        <div class="containerFuncoes">
            <div class="inputCadastro">
                <form class="d-flex" role="search">
                    <input class="form-control form-control-lg me-2" type="search" placeholder="Nome do produto"
                        aria-label="Search">
                    <button class="botao-cadastrar-produto" type="submit">CADASTRAR</button>
                </form>
            </div>

            <div class="tabelaDeProdutos">
                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">Nome</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Vassoura</td>
                            <td><button class="botao-deletar"> DELETAR </button></td>
                        </tr>
                        
                        <tr>
                            <td>Maquina de lavar</td>
                            <td><button class="botao-deletar"> DELETAR </button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
