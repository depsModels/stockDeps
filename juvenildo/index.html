<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem vindo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/styleSass.css">
    
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
</head>
<body>
        <!--TOPO DA PÁGINA-->
        <nav class="navbar">
          <!--BARRA DE PESQUISA-->
          <div class="inputPesquisa">
            <form class="d-flex" role="search">
              <input class="form-control me-2" type="search" placeholder="Procurar cliente" aria-label="Search">
              <button class="btn btn-outline-dark" type="submit">Procurar</button>
            </form>
          </div>
        </nav>
        
        <!--BARRA LATERAL DO SITE-->
        <div class="barraLateral">
            <button class="botaoBarraLateral">
                <img class="iconesBarraLateral" id="iconeEstoque" src="icones/iconeEstoque.png" alt="">
                <p class="nomesBarraLateral">Estoque</p>
            </button>
            <button class="botaoBarraLateral">
                <img class="iconesBarraLateral" id="iconeProduto" src="icones/iconeProduto.png" alt="">
                <p class="nomesBarraLateral">Cadastro</p>
            </button>
            <button class="botaoBarraLateral">
                <img class="iconesBarraLateral" id="iconeContabilidade" src="icones/iconeContabilidade.png" alt="">
                <p class="nomesBarraLateral">Contabilidade</p>
            </button>
            <button class="botaoBarraLateral">
                <img class="iconesBarraLateral" id="iconeClientes" src="icones/iconeClientes.png" alt="">
                <p class="nomesBarraLateral">Clientes</p>
            </button>
            <button class="botaoBarraLateral">
                <img class="iconesBarraLateral" id="iconeRelatorio" src="icones/iconeRelatorio.png" alt="">
                <p class="nomesBarraLateral">Relatório</p>
            </button>
        </div>

</body>
</html>
